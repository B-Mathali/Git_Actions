# Remplacer DOCKERHUB_USERNAME par DOCKER_USERNAME
# Remplacer DOCKERHUB_TOKEN par DOCKER_PASSWORD

name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build Spring Boot JAR
        run: |
          cd springboot/app
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # MODIFICATION ICI : utiliser les noms de secrets existants
      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construction de l'image backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest ./springboot/app

      - name: Construction de l'image frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/angular-app:latest ./angular-app

      - name: Publication de l'image backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest

      - name: Publication de l'image frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/angular-app:latest

      - name: Lancement de l'application avec Docker Compose
        run: docker compose up -d

      - name: Vérification du démarrage des conteneurs
        run: |
          sleep 30
          docker compose ps

      - name: Vérification de la communication frontend/backend
        run: |
          echo "Vérification du backend (port 8081)..."
          curl -f http://localhost:8081/actuator/health || echo "❌ Backend ne répond pas"
          echo "Vérification du frontend (port 4200)..."
          curl -f http://localhost:4200 || echo "❌ Frontend ne répond pas"

      - name: Affichage des logs en cas d'échec
        if: failure()
        run: docker compose logs
